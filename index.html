<!DOCTYPE html>
<html>
<head>
    <title>Seating Arrangement (Direct Roll Mapping)</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .header {
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }

        input {
            margin: 5px;
            padding: 6px;
            border-radius: 6px;
            border: none;
        }

        button {
            margin: 6px 4px;
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            background-color: #ff9800;
            color: white;
            cursor: pointer;
        }

        table {
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
            color: black;
        }

        td {
            border: 1px solid #444;
            padding: 8px;
            text-align: center;
        }

        .hidden { display: none; }
        .error { color: red; }
    </style>
</head>

<body>

<div class="header">
    <h1>GNITS</h1>
    <p>G. Narayanamma Institute of Technology & Science</p>
</div>

<h2>Select Role</h2>
<button onclick="showLogin('teacher')">Teacher</button>
<button onclick="showLogin('student')">Student</button>

<!-- LOGIN -->
<div id="loginPanel" class="hidden">
    <h3 id="loginTitle"></h3>

    <div id="teacherLogin">
        <label>Username:</label>
        <input type="text" id="username"><br>

        <label>Password:</label>
        <input type="password" id="password"><br>
    </div>

    <div id="studentLogin" class="hidden">
        <label>Enter Roll Number:</label>
        <input type="text" id="studentRoll"><br>
    </div>

    <button onclick="login()">Login</button>
    <p id="errorMsg" class="error"></p>
</div>

<!-- PANELS -->
<div id="teacherPanel" class="hidden">
    <h3>Teacher Panel</h3>

    <label>Number of Classes:</label>
    <input type="number" id="classes"><br>

    <label>Rows per Class:</label>
    <input type="number" id="rows"><br>

    <label>Benches per Row:</label>
    <input type="number" id="benches"><br>

    <label>Total Students:</label>
    <input type="number" id="students"><br>

    <button onclick="generateSeating()">Generate Seating</button>
</div>

<div id="studentPanel" class="hidden">
    <h3>Student Panel</h3>
    <button onclick="showSeating()">View My Seat</button>
</div>

<div id="output"></div>

<script>
let role = "";
let classroomData = [];
let currentStudent = "";

/* Teacher credentials */
const teacherCred = {
    username: "lasyapriyapittala",
    password: "Lasya@2007"
};

/* Generate roll numbers list */
function generateRollList(total) {
    let rolls = [];
    let prefix = "25251A04";

    for (let i = 1; i <= total; i++) {
        let num = i.toString().padStart(2, '0'); // 01, 02...
        rolls.push(prefix + num);
    }
    return rolls;
}

function showLogin(selectedRole) {
    role = selectedRole;

    document.getElementById("loginPanel").classList.remove("hidden");
    document.getElementById("loginTitle").innerText = selectedRole.toUpperCase() + " LOGIN";
    document.getElementById("errorMsg").innerText = "";

    if (role === "teacher") {
        document.getElementById("teacherLogin").classList.remove("hidden");
        document.getElementById("studentLogin").classList.add("hidden");
    } else {
        document.getElementById("teacherLogin").classList.add("hidden");
        document.getElementById("studentLogin").classList.remove("hidden");
    }
}

function login() {
    if (role === "teacher") {
        let user = document.getElementById("username").value;
        let pass = document.getElementById("password").value;

        if (user === teacherCred.username && pass === teacherCred.password) {
            document.getElementById("teacherPanel").classList.remove("hidden");
            document.getElementById("loginPanel").classList.add("hidden");
        } else {
            document.getElementById("errorMsg").innerText = "Invalid Teacher Credentials";
        }
    }

    if (role === "student") {
        let roll = document.getElementById("studentRoll").value.toUpperCase();

        let stored = localStorage.getItem("seatingData");
        if (!stored) {
            document.getElementById("errorMsg").innerText = "No seating generated yet.";
            return;
        }

        classroomData = JSON.parse(stored);

        if (isValidStudent(roll)) {
            currentStudent = roll;
            document.getElementById("studentPanel").classList.remove("hidden");
            document.getElementById("loginPanel").classList.add("hidden");
        } else {
            document.getElementById("errorMsg").innerText = "Invalid Roll Number";
        }
    }
}

/* Direct match validation */
function isValidStudent(roll) {
    for (let i = 0; i < classroomData.length; i++) {
        for (let j = 0; j < classroomData[i].length; j++) {
            for (let k = 0; k < classroomData[i][j].length; k++) {
                if (classroomData[i][j][k] === roll) return true;
            }
        }
    }
    return false;
}

function generateSeating() {
    let classes = parseInt(document.getElementById("classes").value);
    let rows = parseInt(document.getElementById("rows").value);
    let benches = parseInt(document.getElementById("benches").value);
    let students = parseInt(document.getElementById("students").value);

    let rollList = generateRollList(students);
    let index = 0;

    classroomData = [];

    for (let i = 0; i < classes; i++) {
        let classArr = [];
        for (let j = 0; j < rows; j++) classArr[j] = [];

        for (let k = 0; k < benches; k++) {
            for (let j = 0; j < rows; j++) {
                if (index < rollList.length) {
                    classArr[j][k] = rollList[index++];
                } else {
                    classArr[j][k] = "X";
                }
            }
        }
        classroomData.push(classArr);
    }

    localStorage.setItem("seatingData", JSON.stringify(classroomData));
    displayFullSeating();
}

function displayFullSeating() {
    let output = "";

    for (let i = 0; i < classroomData.length; i++) {
        output += `<h3>Class ${i+1}</h3><table>`;

        for (let k = 0; k < classroomData[i][0].length; k++) {
            output += "<tr>";
            for (let j = 0; j < classroomData[i].length; j++) {
                let val = classroomData[i][j][k];
                output += `<td>${val}</td>`;
            }
            output += "</tr>";
        }

        output += "</table>";
    }

    document.getElementById("output").innerHTML = output;
}

function showSeating() {
    let output = "";
    let found = false;
    let seatInfo = "";

    for (let i = 0; i < classroomData.length; i++) {
        output += `<h3>Class ${i+1}</h3><table>`;

        for (let k = 0; k < classroomData[i][0].length; k++) {
            output += "<tr>";
            for (let j = 0; j < classroomData[i].length; j++) {

                let val = classroomData[i][j][k];

                if (val === currentStudent) {
                    output += `<td style="background:yellow; font-weight:bold;">${val}</td>`;
                    found = true;
                    seatInfo = `Your seat is in Class ${i+1}, Row ${j+1}, Bench ${k+1}`;
                } else {
                    output += `<td>${val}</td>`;
                }
            }
            output += "</tr>";
        }

        output += "</table>";
    }

    if (found) {
        output = `<h2 style="color:yellow;">${seatInfo}</h2>` + output;
    }

    document.getElementById("output").innerHTML = output;
}
</script>

</body>
</html>
